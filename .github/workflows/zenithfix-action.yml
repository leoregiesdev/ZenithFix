name: ZenithFix Code Audit

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Atualizado para v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run ZenithFix Auditor
      run: |
        # Isso garante que os imports 'from auditors...' funcionem no servidor
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        python src/zenithfix_cli.py src/
